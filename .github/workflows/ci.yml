name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      # --ignore-scripts skips the native build of optional prod deps
      # (sqlite3) that the pure-calculation unit tests do not need.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit tests
        run: npm test
