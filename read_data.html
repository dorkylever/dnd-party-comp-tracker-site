<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read Data Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f8fafc;
      color: #0f172a;
    }

    h1 {
      margin: 0 0 12px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
    }

    pre {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
    }

    th,
    td {
      border: 1px solid #e2e8f0;
      padding: 8px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f1f5f9;
    }

    .status {
      margin: 10px 0 14px;
      font-size: 14px;
      color: #334155;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 10px 0 14px;
    }

    .filters select {
      min-width: 220px;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Read Data Unit Test Page</h1>

  <div class="panel">
    <strong>Exact commands used:</strong>
    <pre>GET ./subclasses.json</pre>
  </div>

  <div id="status" class="status">Loading data...</div>
  <div class="filters">
    <select id="classSelect">
      <option value="">Select class...</option>
    </select>
    <select id="subclassSelect">
      <option value="">Select subclass...</option>
    </select>
  </div>
  <div id="tableContainer"></div>

  <script>
    let subclasses = [];
    let allColumns = [];

    document.getElementById('classSelect').addEventListener('change', (e) => {
      populateSubclassDropdown(e.target.value);
      applyFilters();
    });

    document.getElementById('subclassSelect').addEventListener('change', () => {
      applyFilters();
    });

    function normalizeKey(k) {
      return String(k || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function pickField(row, candidates) {
      if (!row || typeof row !== 'object') return '';
      const keys = Object.keys(row);

      for (const c of candidates) {
        if (row[c] != null && String(row[c]).trim() !== '') return String(row[c]).trim();
      }

      for (const c of candidates) {
        const target = normalizeKey(c);
        const match = keys.find((k) => normalizeKey(k) === target);
        if (match && row[match] != null && String(row[match]).trim() !== '') {
          return String(row[match]).trim();
        }
      }

      return '';
    }

    function getClassName(row) {
      return pickField(row, [
        'class', 'class_name', 'classname', 'dnd_class', 'character_class',
        'Class', 'CLASS'
      ]);
    }

    function getSubclassName(row) {
      return pickField(row, [
        'subclass', 'sub_class', 'subclassname', 'sub_class_name',
        'Subclass', 'SUBCLASS'
      ]);
    }

    function formatOption(row) {
      const subclass = getSubclassName(row) || 'Unknown Subclass';
      const clazz = getClassName(row) || 'Unknown Class';
      return `${subclass} (${clazz})`;
    }

    function populateClassDropdown() {
      const classSelect = document.getElementById('classSelect');
      if (!classSelect) return;

      const classes = [...new Set(subclasses.map(getClassName))]
        .filter(Boolean)
        .sort((a, b) => a.localeCompare(b));

      classSelect.innerHTML = `
        <option value="">Select class...</option>
        ${classes.map(c => `<option value="${c}">${c}</option>`).join('')}
      `;

      populateSubclassDropdown('');
    }

    function populateSubclassDropdown(selectedClass) {
      const subclassSelect = document.getElementById('subclassSelect');
      if (!subclassSelect) return;

      if (!selectedClass) {
        subclassSelect.innerHTML = `<option value="">Select subclass...</option>`;
        return;
      }

      const labels = [...new Set(
        subclasses
          .filter(r => getClassName(r) === selectedClass)
          .map(formatOption)
      )].sort((a, b) => a.localeCompare(b));

      subclassSelect.innerHTML = `
        <option value="">Select subclass...</option>
        ${labels.map(l => `<option value="${l}">${l}</option>`).join('')}
      `;
    }

    async function fetchSubclasses() {
      const status = document.getElementById('status');

      try {
        const response = await fetch('./subclasses.json', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error('Request failed with status ' + response.status);
        }

        const raw = await response.json();
        const rows =
          Array.isArray(raw) ? raw :
          Array.isArray(raw?.rows) ? raw.rows :
          Array.isArray(raw?.data) ? raw.data : [];

        if (!Array.isArray(rows) || rows.length === 0) {
          status.textContent = 'No rows returned.';
          renderTable([]);
          return;
        }

        subclasses = rows.map(r => ({
          ...r,
          class: getClassName(r),
          subclass: getSubclassName(r)
        }));

        const usable = subclasses.filter(r => r.class && r.subclass);
        if (!usable.length) {
          throw new Error('No usable class/subclass fields found. Check JSON key names.');
        }

        subclasses = usable;
        allColumns = Array.from(
          subclasses.reduce((set, row) => {
            Object.keys(row || {}).forEach((key) => set.add(key));
            return set;
          }, new Set())
        );

        populateClassDropdown();
        applyFilters();
      } catch (error) {
        status.textContent = 'Error: ' + error.message;
        renderTable([]);
      }
    }

    function applyFilters() {
      const status = document.getElementById('status');
      const classValue = document.getElementById('classSelect').value;
      const subclassValue = document.getElementById('subclassSelect').value;

      const filtered = subclasses.filter((row) => {
        const classMatch = !classValue || getClassName(row) === classValue;
        const subclassMatch = !subclassValue || formatOption(row) === subclassValue;
        return classMatch && subclassMatch;
      });

      renderTable(filtered);
      status.textContent = 'Loaded ' + filtered.length + ' of ' + subclasses.length + ' rows from ./subclasses.json.';
    }

    function renderTable(rows) {
      const container = document.getElementById('tableContainer');
      if (!rows.length || !allColumns.length) {
        container.innerHTML = '';
        return;
      }

      const headerHtml = allColumns.map((col) => '<th>' + escapeHtml(col) + '</th>').join('');
      const bodyHtml = rows
        .map((row) => {
          const cells = allColumns
            .map((col) => '<td>' + escapeHtml(formatValue(row[col])) + '</td>')
            .join('');
          return '<tr>' + cells + '</tr>';
        })
        .join('');

      container.innerHTML = '<table><thead><tr>' + headerHtml + '</tr></thead><tbody>' + bodyHtml + '</tbody></table>';
    }

    function formatValue(value) {
      if (value === null || value === undefined) return '';
      if (typeof value === 'object') return JSON.stringify(value);
      return String(value);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    fetchSubclasses();
  </script>
</body>
</html>
